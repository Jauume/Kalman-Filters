  h1 { text-align: center; padding: 16px 0 8px; font-size: 1.4rem; color: #7eb8f7; letter-spacing: 1px; }

  .tab-btn {
    padding: 8px 20px; border: none; cursor: pointer; border-radius: 6px 6px 0 0;

  .tab-btn[data-tab="ekf"].active   { background: #3a5fa0; }
  .tab-btn[data-tab="ukf"].active   { background: #6a3a9a; }
  .tab-btn[data-tab="enkf"].active  { background: #1a7a6a; }
  .tab-btn[data-tab="akf"].active   { background: #9a5010; }

  .tab-content { display: none; padding: 0 12px 12px; }
  .tab-content.active { display: block; }

  /* Parameter panel */
  .params {
    background: #22223a; border-radius: 8px; padding: 12px 16px;
    margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 12px 24px; align-items: center;

  /* Charts grid */

  .charts-3row { display: grid; grid-template-rows: 1fr 1fr; gap: 10px; }
  .chart-top    { grid-column: 1 / -1; }
  .chart-box { background: #1e1e32; border-radius: 8px; padding: 8px; position: relative; height: 260px; }
  .chart-box.tall { height: 340px; }

  /* Color accents per tab */

  .ekf-val   { color: #5aa4ff; }
  .ukf-val   { color: #c066ff; }
  .enkf-val  { color: #33d6b0; }

</style>

<script>
// ─── Seeded RNG (Mulberry32) ─────────────────────────────────────────────────
function makeRng(seed) {
  let s = seed >>> 0;
  return () => {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
// Box-Muller standard normal
function randn(rng) {
  const u = 1 - rng(), v = rng();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// ─── Matrix helpers (flat row-major, [rows, cols]) ───────────────────────────
function mat(r, c, data) { return { r, c, d: data ? data.slice() : new Array(r*c).fill(0) }; }
function get(m, i, j) { return m.d[i*m.c + j]; }
function set(m, i, j, v) { m.d[i*m.c + j] = v; }
function mget(m, i, j) { return m.d[i*m.c + j]; }

function mmul(A, B) {
  const C = mat(A.r, B.c);
  for (let i = 0; i < A.r; i++)
    for (let j = 0; j < B.c; j++) {
      let s = 0;
      for (let k = 0; k < A.c; k++) s += get(A,i,k)*get(B,k,j);
      set(C,i,j,s);
    }
  return C;
}
function madd(A, B) {
  const C = mat(A.r, A.c);
  for (let i = 0; i < A.d.length; i++) C.d[i] = A.d[i] + B.d[i];
  return C;
}
function msub(A, B) {
  const C = mat(A.r, A.c);
  for (let i = 0; i < A.d.length; i++) C.d[i] = A.d[i] - B.d[i];
  return C;
}
function mscale(A, s) {
  const C = mat(A.r, A.c);
  for (let i = 0; i < A.d.length; i++) C.d[i] = A.d[i] * s;
  return C;
}
function trans(A) {
  const C = mat(A.c, A.r);
  for (let i = 0; i < A.r; i++)
    for (let j = 0; j < A.c; j++) set(C,j,i,get(A,i,j));
  return C;
}
function eye(n) {
  const I = mat(n,n);
  for (let i = 0; i < n; i++) set(I,i,i,1);
  return I;
}
function diag2(a, b) {
  const D = mat(2,2);
  set(D,0,0,a); set(D,1,1,b);
  return D;
}
// 2×2 inverse
function inv2(A) {
  const det = get(A,0,0)*get(A,1,1) - get(A,0,1)*get(A,1,0);
  const B = mat(2,2);
  set(B,0,0, get(A,1,1)/det); set(B,0,1,-get(A,0,1)/det);
  set(B,1,0,-get(A,1,0)/det); set(B,1,1, get(A,0,0)/det);
  return B;
}
// 4×4 inverse via LU (Gauss-Jordan)
function invN(A) {
  const n = A.r;
  const aug = mat(n, 2*n);
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n; j++) set(aug, i, j, get(A,i,j));
  for (let i = 0; i < n; i++) set(aug, i, n+i, 1);
  for (let col = 0; col < n; col++) {
    let pivot = col;
    for (let row = col+1; row < n; row++)
      if (Math.abs(get(aug,row,col)) > Math.abs(get(aug,pivot,col))) pivot = row;
    const tmp = aug.d.slice(col*2*n, (col+1)*2*n);
    aug.d.splice(col*2*n, 2*n, ...aug.d.slice(pivot*2*n, (pivot+1)*2*n));
    aug.d.splice(pivot*2*n, 2*n, ...tmp);
    const pv = get(aug, col, col);
    for (let j = 0; j < 2*n; j++) set(aug, col, j, get(aug,col,j)/pv);
    for (let row = 0; row < n; row++) {
      if (row === col) continue;
      const f = get(aug, row, col);
      for (let j = 0; j < 2*n; j++) set(aug, row, j, get(aug,row,j) - f*get(aug,col,j));
    }
  }
  const inv = mat(n,n);
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n; j++) set(inv, i, j, get(aug, i, n+j));
  return inv;
}
// Cholesky lower (n×n)
function chol(A) {
  const n = A.r;
  const L = mat(n, n);
  for (let i = 0; i < n; i++) {
    for (let j = 0; j <= i; j++) {
      let s = get(A,i,j);
      for (let k = 0; k < j; k++) s -= get(L,i,k)*get(L,j,k);
      if (i === j) set(L,i,j, Math.sqrt(Math.max(s, 1e-12)));
      else         set(L,i,j, s / get(L,j,j));
    }
  }
  return L;
}
// col vector helpers
function col(arr) { const v = mat(arr.length,1); v.d = arr.slice(); return v; }
function row2arr(m) { return m.d.slice(); }

// ─── Wrap angle to [-π, π] ───────────────────────────────────────────────────
function wrapAngle(a) { return ((a + Math.PI) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI) - Math.PI; }

// ─── KF ─────────────────────────────────────────────────────────────────────
function runKF(Qn, Rn, steps) {
  const rng = makeRng(42);
  const dt = 1;
  // F = [1 dt; 0 1], H = [1 0]
  const F = mat(2,2,[1,dt,0,1]);
  const H = mat(1,2,[1,0]);
  const Q = mscale(eye(2), Qn);
  const R_scalar = Rn;

  const tp = [], meas = [];
  let pos = 0, vel = 1;
  for (let k = 0; k < steps; k++) {
    pos += vel*dt + randn(rng)*Math.sqrt(Qn);
    tp.push(pos);
    meas.push(pos + randn(rng)*Math.sqrt(Rn));
  }

  let x = col([meas[0], 0]);
  let P = eye(2);
  const ep = [], ev = [], sig_p = [];

  for (let k = 0; k < steps; k++) {
    // Predict
    x = mmul(F, x);
    P = madd(mmul(mmul(F, P), trans(F)), Q);
    // Update
    const HxV = mmul(H, x); // 1×1
    const S_val = get(mmul(mmul(H, P), trans(H)), 0, 0) + R_scalar;
    const K = mscale(mmul(P, trans(H)), 1/S_val); // 2×1
    const innov = meas[k] - HxV.d[0];
    x = madd(x, mscale(K, innov));
    P = mmul(msub(eye(2), mmul(K, H)), P);
    ep.push(x.d[0]); ev.push(x.d[1]);
    sig_p.push(Math.sqrt(get(P,0,0)));
  }
  return { tp, meas, ep, ev, sig_p };
}

// ─── EKF ─────────────────────────────────────────────────────────────────────
function runOrbit(steps, rng, Rr, Rb) {
  const dt = 0.1, omega = 0.15, radius = 5;
  const tpx = [], tpy = [], rm = [], bm = [], mpx = [], mpy = [];
  for (let k = 0; k < steps; k++) {
    const t = k * dt * (omega / dt); // = omega * k
    tpx.push(radius * Math.cos(omega * k));
    tpy.push(radius * Math.sin(omega * k));
    const r0 = Math.sqrt(tpx[k]**2 + tpy[k]**2);
    const ri = r0 + randn(rng)*Rr;
    const bi = Math.atan2(tpy[k], tpx[k]) + randn(rng)*Rb;
    rm.push(ri); bm.push(bi);
    mpx.push(ri*Math.cos(bi)); mpy.push(ri*Math.sin(bi));
  }
  return { tpx, tpy, rm, bm, mpx, mpy };
}

function runEKF(Qn, Rr, Rb, steps) {
  const rng = makeRng(7);
  const { tpx, tpy, rm, bm, mpx, mpy } = runOrbit(steps, rng, Rr, Rb);
  const dt = 0.1;
  const F = mat(4,4,[1,0,dt,0, 0,1,0,dt, 0,0,1,0, 0,0,0,1]);
  const Q = mscale(eye(4), Qn);
  const Rmeas = diag2(Rr*Rr, Rb*Rb);

  let x = col([mpx[0], mpy[0], 0, 0]);
  let P = eye(4);
  const epx = [], epy = [];

  for (let k = 0; k < steps; k++) {
    x = mmul(F, x); P = madd(mmul(mmul(F,P),trans(F)), Q);
    const px = x.d[0], py = x.d[1];
    const r = Math.max(Math.sqrt(px*px+py*py), 1e-6);
    const hx = mat(2,1,[r, Math.atan2(py,px)]);
    const Hj = mat(2,4,[px/r, py/r, 0, 0,  -py/(r*r), px/(r*r), 0, 0]);
    const y = mat(2,1,[rm[k]-hx.d[0], wrapAngle(bm[k]-hx.d[1])]);
    const S = madd(mmul(mmul(Hj,P),trans(Hj)), Rmeas);
    const Sinv = inv2(S);
    const K = mmul(mmul(P, trans(Hj)), Sinv);
    x = madd(x, mmul(K, y));
    P = mmul(msub(eye(4), mmul(K, Hj)), P);
    epx.push(x.d[0]); epy.push(x.d[1]);
  }
  return { tpx, tpy, mpx, mpy, epx, epy };
}

// ─── UKF ─────────────────────────────────────────────────────────────────────
function runUKF(Qn, Rr, Rb, steps) {
  const rng = makeRng(7);
  const { tpx, tpy, rm, bm, mpx, mpy } = runOrbit(steps, rng, Rr, Rb);
  const dt = 0.1;
  const F = mat(4,4,[1,0,dt,0, 0,1,0,dt, 0,0,1,0, 0,0,0,1]);
  const Q = mscale(eye(4), Qn);
  const Rmeas = diag2(Rr*Rr, Rb*Rb);

  const n = 4, alpha = 1e-3, beta = 2, kappa = 0;
  const lam = alpha*alpha*(n+kappa) - n;
  const Wm = new Array(2*n+1).fill(1/(2*(n+lam)));
  Wm[0] = lam/(n+lam);
  const Wc = Wm.slice();
  Wc[0] += (1 - alpha*alpha + beta);

  let x = col([mpx[0], mpy[0], 0, 0]);
  let P = eye(4);
  const upx = [], upy = [];

  for (let k = 0; k < steps; k++) {
    // ─ Predict ─
    const sqP1 = chol(mscale(P, n+lam));
    // sigma columns: x, x+cols(sqP1), x-cols(sqP1)  → 2n+1 columns
    const sigma = [];
    sigma.push(x.d.slice());
    for (let j = 0; j < n; j++) {
      const c = []; for (let i = 0; i < n; i++) c.push(get(sqP1,i,j));
      sigma.push(x.d.map((v,i) => v+c[i]));
      sigma.push(x.d.map((v,i) => v-c[i]));
    }
    // Propagate through F
    const sf = sigma.map(s => { const v = col(s); return row2arr(mmul(F,v)); });
    // Predicted mean
    const xp = new Array(n).fill(0);
    for (let i = 0; i < 2*n+1; i++) for (let d = 0; d < n; d++) xp[d] += Wm[i]*sf[i][d];
    // Predicted covariance
    let Pp = mat(n,n, Q.d.slice());
    for (let i = 0; i < 2*n+1; i++) {
      const d = sf[i].map((v,idx) => v - xp[idx]);
      for (let r = 0; r < n; r++)
        for (let c2 = 0; c2 < n; c2++)
          Pp.d[r*n+c2] += Wc[i]*d[r]*d[c2];
    }

    // ─ Update ─
    const sqP2 = chol(mscale(Pp, n+lam));
    const sigma2 = [];
    const xpv = xp;
    sigma2.push(xpv.slice());
    for (let j = 0; j < n; j++) {
      const c = []; for (let i = 0; i < n; i++) c.push(get(sqP2,i,j));
      sigma2.push(xpv.map((v,i) => v+c[i]));
      sigma2.push(xpv.map((v,i) => v-c[i]));
    }
    // h for each sigma point
    const zs = sigma2.map(s => {
      const px2 = s[0], py2 = s[1];
      return [Math.max(Math.sqrt(px2*px2+py2*py2), 1e-6), Math.atan2(py2,px2)];
    });
    const zp = [0, 0];
    for (let i = 0; i < 2*n+1; i++) { zp[0] += Wm[i]*zs[i][0]; zp[1] += Wm[i]*zs[i][1]; }

    let Pzz = mat(2,2, Rmeas.d.slice());
    let Pxz = mat(n,2);
    for (let i = 0; i < 2*n+1; i++) {
      const dZ = [zs[i][0]-zp[0], zs[i][1]-zp[1]];
      const dX = sigma2[i].map((v,idx) => v - xpv[idx]);
      for (let r = 0; r < 2; r++) for (let c2 = 0; c2 < 2; c2++)
        Pzz.d[r*2+c2] += Wc[i]*dZ[r]*dZ[c2];
      for (let r = 0; r < n; r++) for (let c2 = 0; c2 < 2; c2++)
        Pxz.d[r*2+c2] += Wc[i]*dX[r]*dZ[c2];
    }
    const Pzzinv = inv2(Pzz);
    const Kv = mmul(Pxz, Pzzinv); // n×2
    const inn = [rm[k]-zp[0], wrapAngle(bm[k]-zp[1])];
    const xnew = xp.map((v,i) => v + Kv.d[i*2]*inn[0] + Kv.d[i*2+1]*inn[1]);
    // P = Pp - K*Pzz*K'
    const KPzz = mmul(Kv, Pzz);
    const KPzzKt = mmul(KPzz, trans(Kv));
    P = msub(Pp, KPzzKt);
    x = col(xnew);
    upx.push(x.d[0]); upy.push(x.d[1]);
  }
  return { tpx, tpy, mpx, mpy, upx, upy };
}

// ─── EnKF ────────────────────────────────────────────────────────────────────
function runEnKF(Qn, Rr, Rb, steps, Ne) {
  const rng = makeRng(7);
  const { tpx, tpy, rm, bm, mpx, mpy } = runOrbit(steps, rng, Rr, Rb);
  const dt = 0.1;
  const F = mat(4,4,[1,0,dt,0, 0,1,0,dt, 0,0,1,0, 0,0,0,1]);
  const Q = mscale(eye(4), Qn);
  const Rmeas = diag2(Rr*Rr, Rb*Rb);
  const sqQ = chol(Q);
  const sqR = chol(Rmeas);

  // Init ensemble: Ne columns of state
  const E = [];
  for (let i = 0; i < Ne; i++) {
    const noise = [randn(rng),randn(rng),randn(rng),randn(rng)];
    E.push([
      mpx[0] + sqQ.d[0]*noise[0],
      mpy[0] + sqQ.d[5]*noise[1],
      sqQ.d[10]*noise[2],
      sqQ.d[15]*noise[3]
    ]);
  }

  const epx = [], epy = [];

  for (let k = 0; k < steps; k++) {
    // Predict
    for (let i = 0; i < Ne; i++) {
      const v = col(E[i]);
      const Fv = row2arr(mmul(F, v));
      const noise = [randn(rng),randn(rng),randn(rng),randn(rng)];
      // Add process noise (simplified: diagonal sqQ)
      E[i] = Fv.map((val,d) => {
        let n2 = 0;
        for (let j = 0; j < 4; j++) n2 += get(sqQ,d,j)*noise[j];
        return val + n2;
      });
    }

    // Ensemble mean
    const xm = new Array(4).fill(0);
    for (let i = 0; i < Ne; i++) for (let d = 0; d < 4; d++) xm[d] += E[i][d];
    for (let d = 0; d < 4; d++) xm[d] /= Ne;

    // Anomaly matrix A (4×Ne)
    const A = mat(4, Ne);
    for (let i = 0; i < Ne; i++)
      for (let d = 0; d < 4; d++) set(A, d, i, (E[i][d]-xm[d])/Math.sqrt(Ne-1));

    // Perturbed observations (2×Ne)
    const zObs = [];
    for (let i = 0; i < Ne; i++) {
      const n2 = [randn(rng), randn(rng)];
      zObs.push([
        rm[k] + get(sqR,0,0)*n2[0],
        bm[k] + get(sqR,1,1)*n2[1]
      ]);
    }

    // H(x) for each member
    const Hx = E.map(s => {
      const px = s[0], py = s[1];
      return [Math.max(Math.sqrt(px*px+py*py), 1e-6), Math.atan2(py,px)];
    });
    const zm = [0, 0];
    for (let i = 0; i < Ne; i++) { zm[0] += Hx[i][0]; zm[1] += Hx[i][1]; }
    zm[0] /= Ne; zm[1] /= Ne;

    // AH (2×Ne)
    const AH = mat(2, Ne);
    for (let i = 0; i < Ne; i++) {
      set(AH,0,i,(Hx[i][0]-zm[0])/Math.sqrt(Ne-1));
      set(AH,1,i,(Hx[i][1]-zm[1])/Math.sqrt(Ne-1));
    }

    // Pzz = AH*AH' + R (2×2)
    const Pzz = madd(mmul(AH, trans(AH)), Rmeas);
    // Pxz = A*AH' (4×2)
    const Pxz = mmul(A, trans(AH));
    const Kv = mmul(Pxz, inv2(Pzz)); // 4×2

    for (let i = 0; i < Ne; i++) {
      const inn = [zObs[i][0]-Hx[i][0], wrapAngle(zObs[i][1]-Hx[i][1])];
      for (let d = 0; d < 4; d++)
        E[i][d] += get(Kv,d,0)*inn[0] + get(Kv,d,1)*inn[1];
    }

    const xm2 = new Array(4).fill(0);
    for (let i = 0; i < Ne; i++) for (let d = 0; d < 4; d++) xm2[d] += E[i][d];
    epx.push(xm2[0]/Ne); epy.push(xm2[1]/Ne);
  }
  return { tpx, tpy, mpx, mpy, epx, epy };
}

// ─── AKF ─────────────────────────────────────────────────────────────────────
function runAKF(Qn, R0, steps, W) {
  const rng = makeRng(42);
  const dt = 1;
  const F = mat(2,2,[1,dt,0,1]);
  const H = mat(1,2,[1,0]);
  const Q = mscale(eye(2), Qn);

  const tp = [], meas = [];
  let pos = 0, vel = 1;
  for (let k = 0; k < steps; k++) {
    pos += vel*dt + randn(rng)*Math.sqrt(Qn);
    tp.push(pos);
    const Rtrue = R0 * (1 + 3*(k >= steps/2 ? 1 : 0));
    meas.push(pos + randn(rng)*Math.sqrt(Rtrue));
  }

  let x = col([meas[0], 0]);
  let P = eye(2);
  let R = R0;
  const ep = [], ev = [], sig_p = [], Rhist = [];
  const innov = new Array(W).fill(0);

  for (let k = 0; k < steps; k++) {
    x = mmul(F, x); P = madd(mmul(mmul(F,P),trans(F)), Q);
    const S_val = get(mmul(mmul(H,P),trans(H)),0,0) + R;
    const K = mscale(mmul(P, trans(H)), 1/S_val);
    const nu = meas[k] - mmul(H,x).d[0];
    x = madd(x, mscale(K, nu));
    P = mmul(msub(eye(2), mmul(K,H)), P);
    ep.push(x.d[0]); ev.push(x.d[1]);
    sig_p.push(Math.sqrt(get(P,0,0)));
    innov[k % W] = nu;
    if (k >= W-1) {
      const innov2mean = innov.reduce((a,v) => a+v*v, 0) / W;
      const HPH = get(mmul(mmul(H,P),trans(H)),0,0);
      R = Math.max(innov2mean - HPH, 1e-4);
    }
    Rhist.push(R);
  }
  return { tp, meas, ep, ev, sig_p, Rhist };
}

      { label:'True', data:tp.map((v,i)=>({x:k[i],y:v})), borderColor:'#33c85a', borderWidth:2, pointRadius:0, fill:false },
      { label:'Measured', data:meas.map((v,i)=>({x:k[i],y:v})), borderColor:'transparent', pointBackgroundColor:'#f25050', pointRadius:2.5, showLine:false },
      { label:'AKF estimate', data:ep.map((v,i)=>({x:k[i],y:v})), borderColor:col, borderWidth:2, pointRadius:0, fill:false },
      { label:'R jump', data:[{x:N/2,y:null}], borderColor:'#aaa', borderWidth:1.5, borderDash:[5,3], pointRadius:0 }
    ]},
    options:{...CHART_DEFAULTS,parsing:false,plugins:{...CHART_DEFAULTS.plugins,title:{display:true,text:'AKF Position tracking (R doubles at N/2)',color:'#ddd'}}}
  });
  const err_akf=ep.map((v,i)=>Math.abs(v-tp[i]));
  const err_m=meas.map((v,i)=>Math.abs(v-tp[i]));
  const rmse=Math.sqrt(err_akf.reduce((a,v)=>a+v*v,0)/N);
  charts.akf2 = new Chart(document.getElementById('akf-c2').getContext('2d'), {
    type:'line',
    data:{ datasets:[
      { label:'|meas-true|', data:err_m.map((v,i)=>({x:k[i],y:v})), borderColor:'#f25050', borderWidth:1.2, pointRadius:0, fill:false },
      { label:'|AKF-true|', data:err_akf.map((v,i)=>({x:k[i],y:v})), borderColor:col, borderWidth:2, pointRadius:0, fill:false },
      { label:`RMSE=${rmse.toFixed(2)}`, data:k.map(v=>({x:v,y:rmse})), borderColor:col, borderWidth:1.4, borderDash:[4,3], pointRadius:0, fill:false }
    ]},
    options:{...CHART_DEFAULTS,parsing:false,plugins:{...CHART_DEFAULTS.plugins,title:{display:true,text:'Position error',color:'#ddd'}}}
  });
  const R0=+document.getElementById('akf-R').value;
  const Rtrue_vec=k.map(v=>R0*(1+3*(v>N/2?1:0)));
  charts.akf3 = new Chart(document.getElementById('akf-c3').getContext('2d'), {
    type:'line',
    data:{ datasets:[
      { label:'True R', data:Rtrue_vec.map((v,i)=>({x:k[i],y:v})), borderColor:'#33c85a', borderWidth:2, borderDash:[5,3], pointRadius:0, fill:false },
      { label:'Estimated R', data:Rhist.map((v,i)=>({x:k[i],y:v})), borderColor:col, borderWidth:2, pointRadius:0, fill:false }
    ]},
    options:{...CHART_DEFAULTS,parsing:false,plugins:{...CHART_DEFAULTS.plugins,title:{display:true,text:'Adaptive R estimation',color:'#ddd'}}}
  });
}

function updateAKF() {
  const Q=+document.getElementById('akf-Q').value, R0=+document.getElementById('akf-R').value;
  const W=+document.getElementById('akf-W').value, N=+document.getElementById('akf-N').value;
  document.getElementById('akf-Q-val').textContent=`Q = ${Q.toFixed(3)}`;
  document.getElementById('akf-R-val').textContent=`R₀ = ${R0.toFixed(3)}`;
  document.getElementById('akf-W-val').textContent=`W = ${W}`;
  document.getElementById('akf-N-val').textContent=`N = ${N}`;
  const { tp, meas, ep, sig_p, Rhist } = runAKF(Q,R0,N,W);
  const k=range(N), col='#ff9933';
  const upper=ep.map((v,i)=>v+sig_p[i]), lower=ep.map((v,i)=>v-sig_p[i]);
  const c1=charts.akf1;
  c1.data.datasets[0].data=upper.map((v,i)=>({x:k[i],y:v}));
  c1.data.datasets[1].data=lower.map((v,i)=>({x:k[i],y:v}));
  c1.data.datasets[2].data=tp.map((v,i)=>({x:k[i],y:v}));
  c1.data.datasets[3].data=meas.map((v,i)=>({x:k[i],y:v}));
  c1.data.datasets[4].data=ep.map((v,i)=>({x:k[i],y:v}));
  c1.update();
  const err_akf=ep.map((v,i)=>Math.abs(v-tp[i]));
  const err_m=meas.map((v,i)=>Math.abs(v-tp[i]));
  const rmse=Math.sqrt(err_akf.reduce((a,v)=>a+v*v,0)/N);
  const c2=charts.akf2;
  c2.data.datasets[0].data=err_m.map((v,i)=>({x:k[i],y:v}));
  c2.data.datasets[1].data=err_akf.map((v,i)=>({x:k[i],y:v}));
  c2.data.datasets[2].data=k.map(v=>({x:v,y:rmse}));
  c2.data.datasets[2].label=`RMSE=${rmse.toFixed(2)}`;
  c2.update();
  const Rtrue_vec=k.map(v=>R0*(1+3*(v>N/2?1:0)));
  const c3=charts.akf3;
  c3.data.datasets[0].data=Rtrue_vec.map((v,i)=>({x:k[i],y:v}));
  c3.data.datasets[1].data=Rhist.map((v,i)=>({x:k[i],y:v}));
  c3.update();
}

// ─── Tab switching ─────────────────────────────────────────────────────────────
const lazyInit = { ekf: initEKF, ukf: initUKF, enkf: initEnKF, akf: initAKF };
const initialized = { kf: true };

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const id = btn.dataset.tab;
    document.getElementById('tab-'+id).classList.add('active');
    if (!initialized[id] && lazyInit[id]) { lazyInit[id](); initialized[id]=true; }
    // Resize charts in newly visible tab
    setTimeout(() => Object.values(charts).forEach(c => c.resize()), 50);
  });
});

// ─── Slider wiring ─────────────────────────────────────────────────────────────
function wire(ids, fn) {
  ids.forEach(id => document.getElementById(id).addEventListener('input', fn));
}
wire(['kf-Q','kf-R','kf-N'], updateKF);
wire(['ekf-Q','ekf-R','ekf-B','ekf-N'], updateEKF);
wire(['ukf-Q','ukf-R','ukf-B','ukf-N'], updateUKF);
wire(['enkf-Q','enkf-R','enkf-B','enkf-Ne','enkf-N'], updateEnKF);
wire(['akf-Q','akf-R','akf-W','akf-N'], updateAKF);

// ─── Boot ──────────────────────────────────────────────────────────────────────
initKF();
</script>
</body>
</html>
